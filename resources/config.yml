---
#  Zuri Anticheat: https://github.com/ReinfyTeam/Zuri
# Author: ReinfyTeam
# Github: https://github.com/ReinfyTeam
# Email: support@reinfyteam.tk

# Zuri is an anticheat made to protect the server from any may unfair advantages from the players. Open-sourced project by ReinfyTeam.

zuri:
    prefix: "§7(§e§lZuri§r§7) §8>§r"
    language:
        # Active language code. You can switch this live with /zuri language <code> or in /zuri ui.
        locale: "en_US"
        # Fallback locale used when selected locale is missing keys.
        fallback-locale: "en_US"
        # Custom locales are loaded automatically from:
        # - plugins/Zuri/lang/*.yml
        # - plugins/Zuri/langs/*.yml
    # User-facing messages are translated from resources/lang/*.yml now.
    version: "0.3.0" #This config version: DO NOT CHANGE THIS, UNLESS THE DEVELOPER TOLD YOU TO CHANGE THIS!!
    network:
        enable: false # If you are using WaterDogPE, considering using a plugin that supports login-extras to include their player public ip address on their login. This may cause issue between login info's given by WaterDogPE proxy when using this ip limiter. Due the certain issues occured, this feature is now optional prior for the proxy issues.
        #This is to limit the player's access to the same address to the server.
        limit: 3
    ping:
        #This is a customization that helps Zuri test the best cheating players.
        #This is the buyer's discretion if you have custom errors with your server we will not be responsible.
        normal: 20
        lagging: 200
    #Bypass a world according to list.
    world_bypass:
        enable: false
        #You can use "whitelist" or "blacklist", the fallback is blacklist.
        mode: blacklist
        list:
          - "Lobby"
          - "Hub"
          - "world"
    proxy:
        ##This is a feature that is still in the development stage. DON'T ENABLE
        enable: false #Enabling this feature will help every server you're running on your computer be protected by Zuri.
        ip: 127.0.0.1
        port: 19132
    alerts:
        # Sends console and staff alerts whenever a check reaches its pre-violation or punishment threshold.
        enable: true
        # When enabled, only players with the permission below will see alert messages.
        admin: false #This will cause the in-game cheat detector to send it to the person with the permissions below
        permission: "zuri.admin"
    ban:
        # Commands are dispatched from the console after a ban decision is confirmed.
        commands:
            - 'ban "{player_name}" Unfair Advantage'
        enable: true
    detection:
        # Detections when suddenly triggered any checks that detects any kind of hack. This might spam your console or chat. NOT RECOMMENDED.
        enable: false
    kick:
        # This message is used for staff notifications and is separate from the player-facing kick UI.
        enable: true
        # If this is enabled, this will be used. DISABLING THIS, THE FALL BACK KICK WHICH LEADS MANY BUGS, PLAYERS CANNOT BE KICKED ETC.. SO, PLEASE DO NOT DISABLE KICK COMMAND MODE FEATURE.
        commands:
              enable: true
              list:
                 - 'kick "{player_name}" Unfair Advantage'
    warning:
              # Warning is a soft action used by login and captcha flows before a punishment is applied.
              enable: true
    debug:
        # Debug mode prints calculation details for the selected player only.
        enable: true # Allow debugging checks: (/zuri debug)
        log-admin: true # Send to admin their data... Might to cause lag if enabled... Only works if player is in debug mode!
        log-server: false # Log to server, Might to cause lag if enabled... Only works if player is in debug mode also!
    async:
        # Default minimum seconds between dispatches for the same player/check pair.
        default-min-interval: 0.02
        # Max number of in-flight async workers for check evaluation.
        # Recommended: 4-8 for high player counts.
        max-concurrent-workers: 4
        # Number of queued checks evaluated together by one worker execution.
        # Recommended: 64-128 when queue spikes above ~1000.
        batch-size: 64
        # Soft worker processing budget in milliseconds. Lower values favor responsiveness.
        worker-target-ms: 20.0
        # Max queued async payloads before new payloads are dropped.
        max-queue-size: 2048
        # If a worker appears stuck longer than this, recover its slot and retry once.
        worker-timeout-seconds: 3.0
        # Duration to stay in sync-safe fallback mode after async degradation.
        degraded-cooldown-seconds: 6.0
    logging:
        enable: true
        folders:
            logs: "logs"
            crashes: "crashes"
        channels:
            anticheat:
                enable: true
                file: "anticheat.log"
            punishment:
                enable: true
                file: "punishment.log"
            thread:
                enable: true
                file: "thread.log"
            crash:
                enable: true
                file: "crash.log"
            report:
                enable: true
                file: "report.txt"
        cleanup:
            # Removes old files from logs/ and crashes/ folders.
            # Set max-age-days to 0 to disable age-based cleanup.
            max-age-days: 30
            # Optional fixed cutoff date (YYYY-MM-DD). Empty disables date-based cleanup.
            delete-before-date: ""
    confidence:
        # Confidence scoring reduces false positives by requiring a minimum certainty level
        # before triggering violations. Lower values catch more cheats but may false-positive.
        # Higher values reduce false positives but may miss subtle cheats.
        # Range: 0.0 (always trigger) to 1.0 (never trigger). Recommended: 0.4-0.6
        threshold: 0.5
    correlation:
        # Require evidence across multiple check domains before escalating high-impact punishments.
        # Domains tracked: movement, combat, packet_timing.
        enable: true
        # Time window (seconds) where recent domain hits count toward correlation.
        window-seconds: 10.0
        # Number of unique domains required before kick/ban/captcha escalation (1-3).
        required-groups: 3
        # Safety valve: if real violations grow far past maxvl, allow escalation even if
        # correlation groups are not fully satisfied.
        force-escalation-multiplier: 2.5
        force-escalation-extra-real-vl: 3
    dynamic-thresholds:
        # Automatically adjust check thresholds based on server and player conditions.
        # When enabled, thresholds become more lenient during:
        # - High player ping (network latency)
        # - Low server TPS (server lag)
        # - High server load (many players/entities)
        # This significantly reduces false positives during degraded conditions.
        enable: true
    scope:
        world:
            # Optional global world scope for checks.
            enable: false
            # Use "blacklist" or "whitelist".
            mode: blacklist
            list:
                - "lobby"
        gamemode:
            # Optional global gamemode scope for checks.
            enable: false
            # Allowed modes when enabled: survival, adventure, creative, spectator
            list:
                - "survival"
                - "adventure"
    captcha:
        # Captcha is used to pause a player until they complete a verification challenge.
        enable: true
        message: true
        tip: false
        title: false
        randomize: false #If it enable <message, tip, title> must disable
        code:
            # Longer codes are harder to guess but slightly more annoying for legitimate players.
            length: 5
    #Custom permissions
    permissions:
        bypass:
            # Players with this permission are exempt from most detections and punishments.
            enable: true
            permission: "zuri.bypass"
    # Discord Webhook: The instructions of how to use this feature is on github. Please refer to the instruction first.
    # You can find all instructions on github wiki. You can modify webhook send embeds in "webhook.yml".
    discord:
        # Sends ban, kick, detection, and lag alerts to Discord when enabled.
        enable: false # Should discord webhooks are enabled in the server?
