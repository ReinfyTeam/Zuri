zuri:
  config_version: 0.4.0
  # Asynchronous processing settings
  # Adjust these values based on your server's performance and workload.
  async:
    # The maximum number of worker threads to use for asynchronous processing. More workers can handle more batches simultaneously but may consume more resources.
    max_worker: 4
  # Punishment thresholds: Responsible for handling considerations of the player conditions.
  # This involves the ping, server tps, server load that affects modules.
  thresholds:
    default-multiplier: 1.0
    # Adjust ping sensitivity
    ping:
      # Default sensitivity
      default: 1.0
      # Per module sensitivity (if you want to adjust based on module)
      # Ex. Movement checks are more sensitive to ping
      speed: 1.5
      fly: 1.5
      reach: 1.3
      timer: 1.2
    tps:
      # Default sensitivity
      default: 1.0
      # Per module sensitivity (if you want to adjust based on module)
      # Ex. Packet and combat checks are more sensitive to tps
      timer: 2.0
      speed: 1.5
      killaura: 1.2
      reach: 1.2
  punishments:
    ban:
      # The command to execute when a player is banned. 
      # Use {player} as a placeholder for the player's name.
      # Available types: [native, command] (if none specified, defaults to command)
      # If you choose "native", the plugin will use the server's built-in ban system. 
      # If you choose "command", you can specify a custom command to execute.
      type: command
      # To customize ban messages, please see language files to edit manually.
      command: "ban {player} Unfair Advantage"
      # Ban Message for native bans. This is ignored if using a command-based ban.
      message: "Unfair Advantage"
      # Duration of ban if using the native ban system. 
      # Use a format like "30d" for 30 days, "12h" for 12 hours, or "permanent" if permantent bans are allowed. 
      # This is ignored if using a command-based ban.
      duration: "30d"
    kick:
      # The command to execute when a player is kicked.
      # Use {player} as a placeholder for the player's name.
      # Available types: [native, command] (if none specified, defaults to command)
      # If you choose "native", the plugin will use the server's built-in kick system. 
      # If you choose "command", you can specify a custom command to execute.
      type: command
      # To customize kick messages, please see language files to edit manually.
      command: "kick {player} Unfair Advantage"
    
    
    