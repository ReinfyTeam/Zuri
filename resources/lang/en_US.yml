messages:
  # Placeholder docs:
  # - Zuri placeholders: {prefix}, {player_name}, {module}, {subtype}, {realViolation}, {violation}, {code}, {tps}
  # - InfoAPI placeholders (when installed): e.g. {player x}, {player y}, {player z}, {aqua}, {white}
  # - To output literal braces, escape them like: {{ and }}
  # - Color styles supported: legacy (&a, &c, etc.), section (§a), and TextFormat tokens ({BLACK}, {GREEN}, ...)
  alerts:
    message: "{prefix} §f{player_name} §7failed §f{module} §7(§c{subtype}§7) §7VL §2{realViolation}"
  detection:
    message: "{prefix} §f{player_name} §7suspected using §f{module} §7(§c{subtype}§7) §7PRE-VL §2{violation}"
  ban:
    message: "{prefix} §f{player_name} §chas been banned from server for hacking or abuse."
  kick:
    message: "{prefix} §f{player_name} §chas been kicked from server for hacking or abuse."
    ui: "§fYou have been kicked from the server."
    disconnect-reason: "Unfair Advantage: Zuri Anticheat"
  warning:
    message: "{prefix} §l§7[§eWARNING§7] §r§f{player_name} §7is tried using §f{module} §7(§c{subtype}§7)"
  captcha:
    text: "{prefix} §cType §b{code} §cto get rid of mute!"
  server:
    lagging: "{prefix} §cThe server is lagging! The server has currently §b{tps} tps§c! Zuri can't check players at the moment!"
  antibot:
    message: "§cSorry! You are humman?"
  editionfaker:
    message: "§cInvalid client!"
  network:
    limit: "§cSorry the server can't allow access to cross the line."
  chat:
    spam: "{prefix} §cSo sorry! Each chat only has a fixed time of 2 seconds apart."
    command: "{prefix} §cSo sorry! Each command only has a fixed time of 2 seconds apart."
    repeat: "{prefix} §cSo sorry! Don't go back to your chat last time!"
  debug:
    output:
      self: "{prefix} §7[DEBUG] §c{check}§7 (§e{subtype}§7) §b{details}"
