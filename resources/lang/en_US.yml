commands:
  common:
    in-game-only: "{prefix} §cPlease use this command in-game!"
    toggle-status: "{prefix} §7{target} is {status}"
  help:
    header: "§c----- Zuri Anticheat -----"
    build-author: "§bBuild: §7{version}§b Author: §7{author}"
    about: "§c/{command}§r about§7 - Show plugin information."
    notify: "§c/{command}§r notify <toggle|admin>§7 - Enable/disable notifications."
    banmode: "§c/{command}§r banmode <toggle>§7 - Enable/disable ban mode."
    captcha: "§c/{command}§r captcha <toggle|message|tip|title|randomize|length> [length]§7 - Configure captcha mode."
    bypass: "§c/{command}§r bypass§7 - Enable/disable bypass mode."
    debug: "§c/{command}§r debug§7 - Enable/disable debug mode."
    list: "§c/{command}§r list§7 - List all modules."
    ui: "§c/{command}§r ui§7 - Open the admin management UI."
    language: "§c/{command}§r language <locale|list>§7 - Change active language at runtime."
    footer: "§c----------------------"
  language:
    usage: "{prefix} §cUsage: /zuri language <locale|list>"
    current: "{prefix} §7Current language: §b{locale}"
    available: "{prefix} §7Available languages: §b{locales}"
    switched: "{prefix} §aLanguage switched to §b{locale}§a."
    unsupported: "{prefix} §cLanguage §b{locale} §cis not available."
  about:
    build-author: "§bBuild: §7{version}§b Author: §7{author}"
    enabled: "§bTotal Enabled Checks: §7{count} (With SubTypes: {subcount})"
    disabled: "§bTotal Disabled Checks: §7{count} (With SubTypes: {subcount})"
    all: "§bTotal All Checks: §7{count} (With SubTypes: {subcount})"
  list:
    header: "{prefix} §7-------------------------------"
    title: "{prefix} §7Zuri Modules/Check Information List:"
    entry: "{prefix} §r §b{name}§8 (§e{subtypes}§8) §7| §bStatus: {status}§7 | §bMax Violation: §e{maxvl}"
    footer: "{prefix} §7-------------------------------"
  notify:
    usage: "§c/zuri notify <toggle|admin> - Use to on/off notify."
    status: "{prefix} §7{target} is {status}"
  banmode:
    usage: "§c/zuri banmode <toggle> - Use to on/off ban mode."
    status: "{prefix} §7Ban Mode is {status}"
  bypass:
    status: "{prefix} §7Bypass mode is {status}"
  debug:
    status: "{prefix} §7Debug mode is {status}"
  captcha:
    usage: "§c/zuri captcha <toggle|message|tip|title|randomize|length> [length] - Configure captcha settings."
    randomize-on: "{prefix} §cRandomize is on! Turn off randomize to toggle this!"
    invalid-length: "{prefix} §cInvalid usage! /zuri captcha length <int: 1-15>"
    length-updated: "{prefix} §aChanged the code length to {length}!"
  async:
    header: "§e[Zuri] Async pipeline status:"
    queue: "§7Queue: §f{queue}§7 / §f{maxQueue}"
    workers: "§7Workers in flight: §f{inFlight}§7 / §f{maxWorkers}"
    utilization: "§7Utilization: §fqueue={queueUtil}%§7, workers={workerUtil}%"
    players: "§7Players monitored: §f{monitored}§7 (§7online: §f{online}§7/§f{maxPlayers}§7)"
    server: "§7Server: §fTPS={tps}§7, §fload=§f{load}%"
    performance: "§7Performance state: §f{state}"
    resources: "§7Resources: §fmemory={memory}%§7, §fcpuLoad=§f{cpu}§7, §ftps=§f{asyncTps}"
    overload: "§7Overload monitor: §factive={active}§7, §falerts=§f{alerts}"
    profile: "§7Profiler: §fmetrics={metrics}§7, §ftotal=§f{totalMs}ms§7, §fpacketAvg=§f{packetAvgMs}ms"
    totals: "§7Total dispatched: §f{dispatched}§7, §fcompleted: §f{completed}§7, §fdropped: §f{dropped}"
    health: "§7Health: §fstuck §frecovered={stuck}§7, §frestarts={restarts}§7, §flate completions=§f{late}, §ftimeout=§f{timeout}s"
    fallback: "§7Sync fallback: §factive={active}§7, §fused={count}§7, §ferrors={errors}"
    latency: "§7Latency budget avg (s): §fbuild={build}§7, §fqueue=§f{queue}§7, §fworker=§f{worker}§7, §fmerge=§f{merge}"
    avg: "§7Avg worker time: §f{avg}s"

startup:
  source-warning: "{prefix} §cYou are running source-code of the plugin, this may degrade checking performance. We recommend using a built phar release."
  proxy-stopping: "{prefix} §c{error}, stopping proxy..."
  php-too-old: "{prefix} §cYou're running PHP {phpVersion}, which is older than {minimumVersion}. Please upgrade PHP to {minimumVersion} or later."
  vapm-missing: "{prefix} §cLibVapmPMMP is missing from this build. Build with pharynx virion injection (or Poggit virions) before deployment."
  update:
    error: "{prefix} §cAn error occurred while checking updates from GitHub: {error}. Please check your internet connection and try again."
    decode-failed: "{prefix} §cFailed to decode update information."
    none: "{prefix} §aNo updates found. Enjoy!"
    available: "{prefix} §bA new latest version of Zuri is released! ({publishTime})"
    current: "{prefix} §bCurrent Version: {currentVersion}"
    latest: "{prefix} §bLatest Version: {latestVersion} ({branch})"
    downloads: "{prefix} §bDownload Count: {downloadCount}"
    download-url: "{prefix} §bDownload: {downloadUrl} ({fileSizeKB} KB)"

proxy:
  create-failed: "{prefix} §cFailed to create ProxyUDP socket: {error}"
  banner:
    line: "{prefix} §e--------------------------------------------------------------"
    title: "{prefix} §eYOU ARE RUNNING THIS PLUGIN WITH PROXY UDP SUPPORT!"
    testing: "{prefix} §eProxyUDP is in testing stage and may still contain bugs."
    report: "{prefix} §eIf you hit issues, please report them on GitHub."
    performance: "{prefix} §eThis feature can impact performance depending on your network load."
    risk: "{prefix} §eUSE IT AT YOUR OWN RISKS! IM NOT RESPONSIBLE FOR ANY DAMAGE COST."
    disable-hint: "{prefix} §eTo disable this feature, set 'zuri.proxy.enable' to false in the config."
  bound: "{prefix} §aSuccessfully bound to {address}!"
  ready: "{prefix} §aProxy UDP socket is ready to receive packets."
  bind-failed: "{prefix} §cCould not bind to {address}: {error}"

language:
  validation:
    missing: "{prefix} §eLocale §b{locale} §eis missing §b{missingCount} §ekeys. Fallback values will be used."

