    worker-timeout-range: "{prefix} Startup diagnostics: zuri.async.worker-timeout-seconds should be between 0.1 and 30.0."
    degraded-cooldown-range: "{prefix} Startup diagnostics: zuri.async.degraded-cooldown-seconds should be between 0.1 and 120.0."
    worker-target-range: "{prefix} Startup diagnostics: zuri.async.worker-target-ms should be between 1.0 and 250.0."
    correlation-multiplier-range: "{prefix} Startup diagnostics: zuri.correlation.force-escalation-multiplier should be between 1.0 and 20.0."
