      admin: "{prefix} §7[DEBUG] §e{player}: §c{check}§7 (§e{subtype}§7) §b{details}"
    confidence: "Confidence: {confidence}% (threshold: {threshold}%) {details}"
    free-text: "{details}"
    pair: "{key}={value}"
    separator: ", "
    labels:
      allowedbreak: "allowed break"
      iscreative: "is creative"
      blocksbrokeasec: "blocks/sec broken"
      titleid: "title id"
      expectedtime: "expected time"
      hasminingfatugue: "has mining fatigue"
