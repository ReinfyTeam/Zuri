commands:
  common:
    in-game-only: "{prefix} &cPlease use this command in-game!"
    toggle-status: "{prefix} &7{target} is {status}"
  help:
    header: "&c----- Zuri Anticheat -----"
    build-author: "&bBuild: &7{version}&b Author: &7{author}"
    footer: "&c----------------------"
  language:
    usage: "{prefix} &cUsage: /zuri language <locale|list>"
    current: "{prefix} &7Current language: &b{locale}"
    available: "{prefix} &7Available languages: &b{locales}"
    switched: "{prefix} &aLanguage switched to &b{locale}&a."
    unsupported: "{prefix} &cLanguage &b{locale} &cis not available."
  report:
    ready: "{prefix} &aReport generated: &f{file}"
    content:
      title: "Zuri Report"
      generated: "Generated: {date}"
      section-system: "System"
      plugin-version: "- Plugin version: {version}"
      pmmp-version: "- PMMP version: {version}"
      php-version: "- PHP version: {version}"
      players: "- Players: {online}/{max}"
      tps: "- TPS: {tps}"
      checks: "- Checks enabled/disabled: {enabled}/{disabled}"
      section-async: "Async pipeline"
      async-queue: "- Queue: {queue}/{maxQueue} ({utilization})"
      async-batches: "- Queue groups/batches@size: {classGroups}/{batchUnits}@{batchSize}"
      async-workers: "- Workers: {inFlight}/{maxWorkers} ({utilization}, min={minWorkers})"
      async-throughput: "- Throughput: dispatched={dispatched}, completed={completed} ({throughput}), dropped={dropped} ({dropRate})"
      async-threads: "- Thread outcomes: errors={threadErrors}, resultErrors={resultErrors}, retries={retries}, late={late}"
      async-fallback: "- Sync fallback: active={active}, used={count}, errors={errors}"
      async-scaling: "- Optimizer: runs={optimizations}, up={scaleUps}, down={scaleDowns}, alerts={overloadAlerts}, overload={overloadActive}"
      async-latency: "- Latency avg (s): build={build}, queue={queue}, worker={worker}, merge={merge}, targetMs={targetMs}"
      async-resources: "- Resources: mem={memoryUsage}/{memoryLimit} ({memoryUtilization}), peak={memoryPeak}, cpu={cpuLoad}, tps={asyncTps}"
      async-guards: "- Guards: maxLag={maxLag}, maxAge={maxAge}s, timeout={timeout}s, degradedUntil={degradedUntil}, lastDispatch={lastDispatchAt}, lastComplete={lastCompleteAt}, lastHealth={lastHealthCheckAt}"
      section-profiler: "Profiler"
      profiler-metrics: "- Metrics: {metrics}"
      profiler-total: "- Total ms: {totalMs}"
      profiler-packet: "- Packet avg ms: {packetAvgMs}"
      safe-exceptions: "- Safe exceptions (window): {count}"
      section-config: "Configuration snapshot"
      cfg-language: "- Language: locale={locale}, fallback={fallback}"
      cfg-alerts: "- Alerts: enable={enable}, adminOnly={adminOnly}, permission={permission}"
      cfg-punishments: "- Actions: ban={ban}, kick={kick}, detection={detection}, warning={warning}"
      cfg-debug: "- Debug: enabled={debug}, logAdmin={logAdmin}, logServer={logServer}"
      cfg-captcha: "- Captcha: enable={enable}, message={message}, tip={tip}, title={title}, randomize={randomize}, length={length}"
      cfg-async: "- Async cfg: workers={workers}, batch={batchSize}, targetMs={targetMs}, maxQueue={maxQueue}, timeout={timeout}, degradedCooldown={degraded}"
      cfg-safety: "- Safety cfg: confidence={confidence}, dynamicThresholds={dynamicThresholds}, correlation={correlation}, window={correlationWindow}, groups={correlationGroups}, forceMultiplier={forceMultiplier}, forceExtraVl={forceExtraVl}"
      cfg-logging: "- Logging: enable={enable}, folders={logsFolder}/{crashesFolder}, retentionDays={retentionDays}, deleteBeforeDate={deleteBeforeDate}"
      cfg-log-channels: "- Log channels: anticheat={anticheat}, punishment={punishment}, thread={thread}, crash={crash}, report={report}"
      recent-crashes-header: "Recent crash errors (latest {count} entries):"
      recent-crashes-none: "- none"
      recent-crashes-entry: "- {line}"
      recent-async-header: "Recent async thread failures (latest {count} lines):"
      recent-async-none: "- none"
      recent-async-entry: "- {line}"
      section-backtrace: "Backtrace diagnostics"
      backtrace-header: "Recent backtrace lines (latest {count} entries):"
      backtrace-none: "- none"
      backtrace-entry: "- {line}"
      section-debug-history: "Debug history"
      debug-history-header: "Last player check debug entries (latest {count}):"
      debug-history-none: "- none"
      debug-history-entry: "- {line}"
      bool-true: "true"
      bool-false: "false"
  about:
    build-author: "{prefix} &bBuild: &7{version}&b Author: &7{author}"
    enabled: "{prefix} &bTotal Enabled Checks: &7{count} (With SubTypes: {subcount})"
    disabled: "{prefix} &bTotal Disabled Checks: &7{count} (With SubTypes: {subcount})"
    all: "{prefix} &bTotal All Checks: &7{count} (With SubTypes: {subcount})"
  list:
    header: "{prefix} &7-------------------------------"
    title: "{prefix} &7Zuri Modules/Check Information List:"
    entry: "{prefix} &r &b{name}&8 (&e{subtypes}&8) &7| &bStatus: {status}&7 | &bMax Violation: &e{maxvl}"
    footer: "{prefix} &7-------------------------------"
  notify:
    usage: "&c/zuri notify <toggle|admin> - Use to on/off notify."
    status: "{prefix} &7{target} is {status}"
  banmode:
    usage: "&c/zuri banmode - Use to on/off ban mode."
    status: "{prefix} &7Ban Mode is {status}"
  bypass:
    status: "{prefix} &7Bypass mode is {status}"
  debug:
    status: "{prefix} &7Debug mode is {status}"
  captcha:
    usage: "&c/zuri captcha <toggle|message|tip|title|randomize|length> [length] - Configure captcha settings."
    randomize-on: "{prefix} &cRandomize is on! Turn off randomize to toggle this!"
    invalid-length: "{prefix} &cInvalid usage! /zuri captcha length <int: 1-15>"
    length-updated: "{prefix} &aChanged the code length to {length}!"
  async:
    header: "&e{prefix} Async pipeline status:"
    queue: "{prefix} &7Queue: &f{queue}&7 / &f{maxQueue}&7 (&f{classCombinedLabel}={classGroups}&7, &f{batchesLabel}={batchUnits}&7 @ &f{batchSizeLabel}={batchSize}&7)"
    queue-class-combined: "classCombined"
    queue-batches: "batches"
    queue-batch-size: "batchSize"
    workers: "{prefix} &7Workers in flight: &f{inFlight}&7 / &f{maxWorkers}"
    utilization: "{prefix} &7Utilization: &fqueue={queueUtil}&7, &fworkers={workerUtil}"
    players: "{prefix} &7Players monitored: &f{monitored}&7 (&7online: &f{online}&7/&f{maxPlayers}&7)"
    server: "{prefix} &7Server: &fTPS={tps}&7, &fload={load}"
    performance: "{prefix} &7Performance state: &f{state}"
    resources: "{prefix} &7Resources: &fmemory={memory}&7, &fcpuLoad={cpu}&7, &ftps=&f{asyncTps}"
    overload: "{prefix} &7Overload monitor: &factive={active}&7, &falerts=&f{alerts}"
    profile: "{prefix} &7Profiler: &fmetrics={metrics}&7, &ftotal=&f{totalMs}ms&7, &fpacketAvg=&f{packetAvgMs}ms"
    totals: "{prefix} &7Total dispatched: &f{dispatched}&7, &fcompleted: &f{completed}&7, &fdropped: &f{dropped}"
    health: "{prefix} &7Health: &fstuck &frecovered={stuck}&7, &frestarts={restarts}&7, &flate completions=&f{late}, &ftimeout=&f{timeout}s"
    threads: "{prefix} &7Thread outcomes: &ferrors={errors}&7, &fresultErrors={resultErrors}&7, &fretries={retries}"
    fallback: "{prefix} &7Sync fallback: &factive={active}&7, &fused={count}&7, &ferrors={errors}"
    latency: "{prefix} &7Latency budget avg (s): &fbuild={build}&7, &fqueue=&f{queue}&7, &fworker=&f{worker}&7, &fmerge=&f{merge}"
    avg: "{prefix} &7Avg worker time: &f{avg}s"

startup:
  source-warning: "{prefix} &cYou are running source-code of the plugin, this may degrade checking performance. We recommend using a built phar release."
