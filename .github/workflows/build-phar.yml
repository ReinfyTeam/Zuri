name: Build Phar with Virions

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP for PocketMine-MP
        uses: pmmp/setup-php-action@3.2.0
        with:
          php-version: 8.2
          pm-version-major: 5
      
      - name: Install composer dependencies
        run: composer install --prefer-dist
      
      - name: Run php-cs-fixer (for source code)
        run: ./vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --verbose
      
      - name: Build plugin phar
        run: composer run-script build

      - name: Normalize phar artifact path
        run: |
          set -euo pipefail
          mkdir -p build

          if [ -f "build/Zuri.phar" ]; then
            echo "Found build/Zuri.phar"
          elif [ -f "Zuri.phar" ]; then
            mv Zuri.phar build/Zuri.phar
            echo "Moved Zuri.phar to build/Zuri.phar"
          else
            echo "Could not find built phar artifact."
            find . -maxdepth 4 -type f -name '*.phar' -print
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Zuri
          path: build/Zuri.phar
          if-no-files-found: error
